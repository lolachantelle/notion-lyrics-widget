<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;

    /* 🌙 IMPORTANT: now transparent-friendly */
    background: transparent;

    font-family: 'Inter', sans-serif;
}

/* 🌸 smaller Notion-friendly card */
.card {
    width: 260px;   /* smaller so 3-column Notion layouts feel good */
    padding: 18px 16px;

    border-radius: 18px;

    background: rgba(255, 255, 255, 0.55);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);

    border: 1px solid rgba(255,255,255,0.35);
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);

    text-align: center;

    transition: opacity 0.25s ease, transform 0.25s ease;
}

/* fade animation */
.fade {
    opacity: 0;
    transform: translateY(4px);
}

/* ✨ lyric styling */
.lyric {
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    line-height: 1.5;
    color: #2b2a28;
    white-space: pre-line; /* IMPORTANT: keeps your line breaks */
}

/* artist + song */
.source {
    margin-top: 10px;
    font-size: 12px;
    color: #6f6a64;
    font-style: italic;
}

/* divider */
.divider {
    width: 40px;
    height: 1px;
    background: rgba(0,0,0,0.15);
    margin: 12px auto;
}

/* button */
button {
    margin-top: 10px;
    background: #d8a7b1;
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 999px;
    cursor: pointer;
    font-size: 12px;
    transition: transform 0.15s ease;
}

button:hover {
    transform: scale(1.05);
}
</style>
</head>

<body>

<div class="card" id="card">

    <div class="lyric" id="lyric"></div>

    <div class="divider"></div>

    <div class="source" id="source"></div>

    <button onclick="nextLyric()">↻ shuffle</button>

</div>

<script>
const lyrics = [
{
lyric: "Too young to hold on\nAnd too old to just break free and run",
song: "Lover, You Should've Come Over",
artist: "Jeff Buckley"
},
{
lyric: "Anyway, don't be a stranger",
song: "Scott Street",

},
{
lyric: "It's so easy to laugh, it's so easy to hate\nIt takes strength to be gentle and kind",
song: "I Know It's Over",

},
{
lyric: "Yeah, my boyfriend's pretty cool\nBut he's not as cool as me",
song: "Brooklyn Baby",

},
{
lyric: "What a waste, army dreamers",

},
{
lyric: "You're in the wind, I'm in the water\nNobody's son, nobody's daughter",
song: "Chemtrails Over the Country Club",

},
{
lyric: "And I watched you change\nIt's like you never had wings",
song: "Change (In the House of Flies)",

},
{
lyric: "If like, you should sink down beneath\nI'll swim down, would you?",
song: "Cherry Waves",
artist: "Deftones"
},
{
lyric: "Stay with me\nAs we cross the empty skies",
song: "Rosemary",
artist: "Deftones"
},
{
lyric: "From the day you arrive\nI have stayed by your side",
song: "Entombed",

},
{

},

},
{
lyric: "She's the angel on top of the tree",

},
{

},
{

}
];

let remaining = [...Array(lyrics.length).keys()];

function nextLyric() {
const card = document.getElementById("card");
card.classList.add("fade");

setTimeout(() => {

if (remaining.length === 0) {
remaining = [...Array(lyrics.length).keys()];
}

const index = Math.floor(Math.random() * remaining.length);
const lyricIndex = remaining.splice(index, 1)[0];

const item = lyrics[lyricIndex];

document.getElementById("lyric").innerText = item.lyric;
document.getElementById("source").innerHTML =
`— <i>${item.artist}</i>, ${item.song}`;

card.classList.remove("fade");

}, 200);
}

nextLyric();
</script>

</body>
</html>
