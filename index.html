<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at top, #f7f1ea, #e9dfd6);
    font-family: 'Inter', sans-serif;
}

/* 🌸 main glass card */
.card {
    width: 360px;
    padding: 28px;
    border-radius: 22px;

    background: rgba(255, 255, 255, 0.55);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);

    box-shadow: 0 20px 60px rgba(0,0,0,0.12);
    border: 1px solid rgba(255,255,255,0.4);

    text-align: center;

    transition: opacity 0.35s ease, transform 0.35s ease;
}

/* fade animation trigger */
.fade-out {
    opacity: 0;
    transform: translateY(6px);
}

/* lyric text */
.lyric {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    line-height: 1.5;
    color: #2c2a28;
    margin-bottom: 18px;
}

/* source */
.source {
    font-size: 13px;
    color: #6f6a64;
    margin-bottom: 22px;
}

/* divider */
.divider {
    width: 60px;
    height: 1px;
    background: #d6ccc2;
    margin: 14px auto;
}

/* button */
button {
    background: #d8a7b1;
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 999px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: transform 0.2s ease, background 0.2s ease;
}

button:hover {
    transform: scale(1.05);
    background: #c98f9b;
}

/* tiny decorative icon */
.note {
    font-size: 18px;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="card" id="card">

    <div class="note">✿</div>

    <div class="lyric" id="lyric">
        Loading...
    </div>

    <div class="divider"></div>

    <div class="source" id="source"></div>

    <button onclick="newLyric()">↻ shuffle</button>

</div>

<script>
const lyrics = [
{
lyric: "You said you like my hair, so go ahead and touch it",
song: "Apple Cider",
artist: "beabadoobee"
},
{
lyric: "I wish I could be more than just someone you used to know",
song: "Glue Song",
artist: "beabadoobee"
},
{
lyric: "And I still think about you in the middle of the night",
song: "Talk",
artist: "beabadoobee"
},
{
lyric: "Tell me that you love me even if it isn't true",
song: "Pretty Girl",
artist: "Clairo"
}
];

function newLyric() {
const card = document.getElementById("card");

card.classList.add("fade-out");

setTimeout(() => {

const item = lyrics[Math.floor(Math.random() * lyrics.length)];

document.getElementById("lyric").innerText = `"${item.lyric}"`;
document.getElementById("source").innerText = `— ${item.artist}, ${item.song}`;

card.classList.remove("fade-out");

}, 250);
}

newLyric();
</script>

</body>
</html>
